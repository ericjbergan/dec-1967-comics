<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>December 1967 Comics</title>
<style>
  :root {
    --bg: #f6f4ee;
    --panel: #fff;
    --ink: #1c1c1c;
    --accent: #b22222;
    --muted: #666;
    --border: #d8d3c4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 16px 24px;
    border-bottom: 4px solid #000;
  }
  header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 0.5px; }
  header p { margin: 4px 0 0; font-size: 0.9rem; opacity: 0.9; }

  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 24px;
    padding: 24px;
  }
  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
  }

  aside {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    height: fit-content;
  }
  aside h2 { margin: 0 0 8px; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
  .pub-list { list-style: none; padding: 0; margin: 0; }
  .pub-list li {
    padding: 6px 8px;
    cursor: pointer;
    border-bottom: 1px dotted var(--border);
    display: flex;
    justify-content: space-between;
  }
  .pub-list li:hover { background: #f0ece0; }
  .pub-list li.active { background: var(--accent); color: #fff; }
  .pub-list li .count { color: var(--muted); font-size: 0.85rem; }
  .pub-list li.active .count { color: #fff; }

  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-bar input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 1rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px;
    display: flex;
    flex-direction: column;
  }
  .card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    background: #eee;
    border: 1px solid var(--border);
  }
  .card .no-cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    background: repeating-linear-gradient(45deg, #eee, #eee 10px, #ddd 10px, #ddd 20px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    padding: 0 10px;
    cursor: pointer;
  }
  .card .no-cover:hover { background: repeating-linear-gradient(45deg, #e4e4e4, #e4e4e4 10px, #d0d0d0 10px, #d0d0d0 20px); }
  .cover-wrap { position: relative; }
  .cover-wrap .replace {
    position: absolute;
    right: 4px;
    bottom: 4px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 3px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .cover-wrap:hover .replace { opacity: 1; }
  .file-input { display: none; }
  .card h3 { margin: 8px 0 2px; font-size: 1rem; }
  .card .issue { color: var(--muted); font-size: 0.85rem; }
  .card .pub { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .card.owned { background: #eef6ea; border-color: #a4c493; }
  .own-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dotted var(--border);
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .own-row input { cursor: pointer; }
  .card.owned .own-row { color: #3a5f2c; font-weight: bold; }
  .ebay-btn {
    margin-top: 6px;
    padding: 6px 10px;
    background: #0064d2;
    color: #fff;
    border: none;
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .ebay-btn:hover { background: #0053b0; }
  .ebay-btn:disabled { background: #999; cursor: wait; }
  #ebay-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #ebay-modal.open { display: flex; }
  #ebay-modal .box {
    background: var(--panel);
    width: min(760px, 92vw);
    max-height: 86vh;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  }
  #ebay-modal .hd {
    padding: 12px 16px;
    background: var(--accent);
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  #ebay-modal .hd h2 { margin: 0; font-size: 1.05rem; font-weight: normal; }
  #ebay-modal .hd .sub { font-size: 0.8rem; opacity: 0.85; }
  #ebay-modal .close {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.6);
    color: #fff;
    width: 28px;
    height: 28px;
    font-size: 1rem;
    cursor: pointer;
    line-height: 1;
  }
  #ebay-modal .body {
    padding: 12px 16px;
    overflow-y: auto;
    font-size: 0.9rem;
  }
  #ebay-modal .listing {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dotted var(--border);
    align-items: start;
  }
  #ebay-modal .listing:last-child { border-bottom: none; }
  #ebay-modal img { width: 64px; height: 64px; object-fit: cover; }
  #ebay-modal .no-thumb { width: 64px; height: 64px; background: #ddd; }
  #ebay-modal .lt { line-height: 1.3; min-width: 0; }
  #ebay-modal .lt a { color: #0064d2; text-decoration: none; }
  #ebay-modal .lt a:hover { text-decoration: underline; }
  #ebay-modal .lt .cond { color: var(--muted); font-size: 0.8rem; margin-top: 3px; }
  #ebay-modal .price {
    text-align: right;
    white-space: nowrap;
    line-height: 1.3;
  }
  #ebay-modal .price .total { font-weight: bold; font-size: 1rem; }
  #ebay-modal .price .breakdown { color: var(--muted); font-size: 0.75rem; }
  #ebay-modal .err { color: var(--accent); }
  #ebay-modal .loading { color: var(--muted); text-align: center; padding: 30px 0; }

  .filter-row {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.9rem;
    margin-bottom: 12px;
    color: var(--muted);
  }
  .filter-row label { cursor: pointer; }
  .stats { margin-left: auto; }

  .empty {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    background: var(--panel);
    border: 1px dashed var(--border);
  }
</style>
</head>
<body>
<header>
  <h1>December 1967 Comics</h1>
  <p>Cover-dated December 1967 &mdash; searchable archive</p>
</header>

<div class="layout">
  <aside>
    <h2>Publishers</h2>
    <ul class="pub-list" id="pub-list">
      <li class="active" data-pub="">All <span class="count" id="total-count">0</span></li>
    </ul>
  </aside>

  <main>
    <div class="search-bar">
      <input id="search" type="search" placeholder="Search by title, character, writer, artist..." />
    </div>
    <div class="filter-row">
      <label><input type="radio" name="owned-filter" value="" checked /> All</label>
      <label><input type="radio" name="owned-filter" value="1" /> Owned only</label>
      <label><input type="radio" name="owned-filter" value="0" /> Missing only</label>
      <span class="stats" id="stats"></span>
    </div>
    <div id="results" class="grid"></div>
    <div id="empty" class="empty" style="display:none">No comics yet. Data will appear as it's added to the database.</div>
  </main>
</div>

<div id="ebay-modal" role="dialog" aria-modal="true" aria-labelledby="ebay-title">
  <div class="box">
    <div class="hd">
      <div>
        <h2 id="ebay-title">eBay listings</h2>
        <div class="sub" id="ebay-sub"></div>
      </div>
      <button class="close" id="ebay-close" aria-label="Close">×</button>
    </div>
    <div class="body" id="ebay-body"></div>
  </div>
</div>

<script>
  let currentPublisher = "";
  let currentQuery = "";
  let currentOwned = "";

  const ebayModal = document.getElementById("ebay-modal");
  const ebayTitle = document.getElementById("ebay-title");
  const ebaySub = document.getElementById("ebay-sub");
  const ebayBody = document.getElementById("ebay-body");

  function closeEbayModal() {
    ebayModal.classList.remove("open");
  }
  document.getElementById("ebay-close").addEventListener("click", closeEbayModal);
  ebayModal.addEventListener("click", (e) => {
    if (e.target === ebayModal) closeEbayModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && ebayModal.classList.contains("open")) closeEbayModal();
  });

  function formatPrice(l) {
    if (l.price == null) return '<span class="total">—</span>';
    const price = '$' + l.price.toFixed(2);
    if (l.shipping == null) {
      return `<span class="total">${price}</span>
              <div class="breakdown">+ shipping unknown</div>`;
    }
    if (l.shipping_free) {
      return `<span class="total">${price}</span>
              <div class="breakdown">free shipping</div>`;
    }
    const ship = '$' + l.shipping.toFixed(2);
    const total = '$' + l.total.toFixed(2);
    return `<span class="total">${total}</span>
            <div class="breakdown">${price} + ${ship}</div>`;
  }

  async function openEbayModal(comic) {
    ebayTitle.textContent = `${comic.title} #${comic.issue_number}`;
    ebaySub.textContent = `${comic.publisher} · ${comic.cover_date || ""}`;
    ebayBody.innerHTML = '<div class="loading">Searching eBay…</div>';
    ebayModal.classList.add("open");
    try {
      const r = await fetch(`/api/comics/${comic.id}/ebay`);
      const j = await r.json();
      if (!r.ok) {
        ebayBody.innerHTML = `<div class="err">${j.error || 'Search failed'}</div>`;
      } else if (!j.listings.length) {
        ebayBody.innerHTML = `<div>No listings found for <em>${j.query}</em></div>`;
      } else {
        ebayBody.innerHTML = j.listings.map(l => `
          <div class="listing">
            ${l.thumbnail ? `<img src="${l.thumbnail}" alt="" />` : '<div class="no-thumb"></div>'}
            <div class="lt">
              <a href="${l.url}" target="_blank" rel="noopener">${l.title}</a>
              <div class="cond">${l.condition}${l.seller ? ' · ' + l.seller : ''}</div>
            </div>
            <div class="price">${formatPrice(l)}</div>
          </div>
        `).join('');
      }
    } catch (e) {
      ebayBody.innerHTML = `<div class="err">${e.message}</div>`;
    }
  }

  async function loadStats() {
    const r = await fetch("/api/stats");
    const s = await r.json();
    document.getElementById("stats").textContent =
      `${s.owned} / ${s.total} owned`;
  }

  async function loadPublishers() {
    const r = await fetch("/api/publishers");
    const data = await r.json();
    const list = document.getElementById("pub-list");
    list.querySelectorAll("li:not([data-pub=''])").forEach(el => el.remove());
    let total = 0;
    for (const p of data) {
      total += p.count;
      const li = document.createElement("li");
      li.dataset.pub = p.publisher;
      li.innerHTML = `${p.publisher} <span class="count">${p.count}</span>`;
      li.onclick = () => selectPublisher(p.publisher, li);
      list.appendChild(li);
    }
    document.getElementById("total-count").textContent = total;
  }

  function selectPublisher(pub, el) {
    currentPublisher = pub;
    document.querySelectorAll(".pub-list li").forEach(li => li.classList.remove("active"));
    el.classList.add("active");
    loadComics();
  }

  document.querySelector(".pub-list li[data-pub='']").onclick = function() {
    selectPublisher("", this);
  };

  async function loadComics() {
    const params = new URLSearchParams();
    if (currentPublisher) params.set("publisher", currentPublisher);
    if (currentQuery) params.set("q", currentQuery);
    const r = await fetch("/api/comics?" + params.toString());
    const data = await r.json();
    const grid = document.getElementById("results");
    const empty = document.getElementById("empty");
    grid.innerHTML = "";
    if (data.length === 0) {
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";
    for (const c of data) {
      const card = document.createElement("div");
      card.className = "card" + (c.owned ? " owned" : "");
      card.dataset.id = c.id;
      const coverHtml = c.cover_image
        ? `<div class="cover-wrap">
             <img src="/covers/${c.cover_image}?v=${Date.now()}" alt="${c.title} cover" />
             <span class="replace">replace</span>
           </div>`
        : `<div class="no-cover">click to add cover</div>`;
      card.innerHTML = `
        ${coverHtml}
        <input type="file" class="file-input" accept="image/*" />
        <div class="pub">${c.publisher}</div>
        <h3>${c.title}</h3>
        <div class="issue">${c.issue_number ? "#" + c.issue_number : ""} &middot; ${c.cover_date || ""}</div>
        <label class="own-row">
          <input type="checkbox" ${c.owned ? "checked" : ""} />
          <span>${c.owned ? "In collection" : "Mark as owned"}</span>
        </label>
        <button class="ebay-btn">Search eBay</button>
      `;
      const fileInput = card.querySelector('.file-input');
      const coverTrigger = card.querySelector('.no-cover, .cover-wrap');
      coverTrigger.addEventListener('click', (e) => {
        // Only intercept clicks on the placeholder or the "replace" badge
        if (e.target.classList.contains('replace') || e.target.classList.contains('no-cover')) {
          fileInput.click();
        }
      });
      fileInput.addEventListener('change', async () => {
        if (!fileInput.files[0]) return;
        const fd = new FormData();
        fd.append('file', fileInput.files[0]);
        const resp = await fetch(`/api/comics/${c.id}/cover`, {method: 'POST', body: fd});
        if (resp.ok) loadComics();
      });
      const ebayBtn = card.querySelector('.ebay-btn');
      ebayBtn.addEventListener('click', () => {
        openEbayModal(c);
      });

      const cb = card.querySelector('.own-row input[type=checkbox]');
      cb.addEventListener('change', async () => {
        const resp = await fetch(`/api/comics/${c.id}/owned`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({owned: cb.checked}),
        });
        const j = await resp.json();
        card.classList.toggle("owned", j.owned);
        card.querySelector(".own-row span").textContent =
          j.owned ? "In collection" : "Mark as owned";
        loadStats();
        if (currentOwned !== "") loadComics();
      });
      grid.appendChild(card);
    }
  }

  document.getElementById("search").addEventListener("input", (e) => {
    currentQuery = e.target.value.trim();
    loadComics();
  });

  document.querySelectorAll('input[name="owned-filter"]').forEach(el => {
    el.addEventListener("change", () => {
      currentOwned = el.checked ? el.value : currentOwned;
      loadComics();
    });
  });

  loadPublishers();
  loadStats();
  loadComics();
</script>
</body>
</html>
